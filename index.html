  <script>
    const stage = document.querySelector(".home-stage");
    const fitTarget = document.querySelector("[data-fit-home]");
    const promptTextarea = document.querySelector(".prompt-card textarea");
    const profileName = document.querySelector(".profile-button strong");
    const profileAvatar = document.querySelector(".avatar");
    const DS_ONE_CONFIG = window.DS_ONE_CONFIG || {};
    const AI_API_URL = DS_ONE_CONFIG.endpoints?.aiApi || "https://kqqfvskmozjalmairjxa.supabase.co/functions/v1/ai-api";
    const SSO_SESSION_TOKEN_KEY = "sso_session_token";

    function readSsoSessionToken() {
      const url = new URL(location.href);
      const tokenFromUrl = url.searchParams.get("token");

      if (tokenFromUrl) {
        sessionStorage.setItem(SSO_SESSION_TOKEN_KEY, tokenFromUrl);
        url.searchParams.delete("token");
        history.replaceState({}, "", url.toString());
        return tokenFromUrl;
      }

      return sessionStorage.getItem(SSO_SESSION_TOKEN_KEY) || "";
    }

    function decodeSessionTokenPayload(token) {
      const body = String(token || "").split(".")[0];
      if (!body) return null;

      try {
        let base64 = body.replaceAll("-", "+").replaceAll("_", "/");
        while (base64.length % 4) base64 += "=";
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);

        const payload = JSON.parse(new TextDecoder().decode(bytes));
        if (payload.exp && Number(payload.exp) * 1000 < Date.now()) {
          sessionStorage.removeItem(SSO_SESSION_TOKEN_KEY);
          return null;
        }
        return payload;
      } catch {
        return null;
      }
    }

    function getDisplayName(profile) {
      const candidates = [
        profile?.userName,
        profile?.user_name,
        profile?.name,
        profile?.displayName,
        profile?.display_name,
        profile?.empName,
        profile?.empNm,
        profile?.loginId,
        profile?.login_id,
        profile?.empNo,
        profile?.emp_no,
      ];

      return candidates
        .map((value) => String(value || "").trim())
        .find((value) => value && value !== "undefined" && value !== "null") || "";
    }

    function applyHeaderProfile(profile) {
      const displayName = getDisplayName(profile);
      if (!displayName) return;

      if (profileName) profileName.textContent = displayName;
      if (profileAvatar) profileAvatar.textContent = displayName.slice(0, 1);
    }

    async function bootstrapSsoProfile() {
      const token = readSsoSessionToken();
      if (!token) return;

      const tokenProfile = decodeSessionTokenPayload(token);
      if (tokenProfile) applyHeaderProfile(tokenProfile);

      try {
        const res = await fetch(AI_API_URL, {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`,
          },
        });

        const profile = await res.json().catch(() => null);
        if (res.ok && profile?.ok) applyHeaderProfile(profile);
      } catch {
        // 로컬 file:// 또는 허용되지 않은 Origin에서는 프로필 조회가 실패할 수 있습니다.
        // 이 경우 URL 토큰 payload에서 읽은 loginId/empNo 표시만 유지합니다.
      }
    }

    function resizePromptTextarea() {
      if (!promptTextarea) return;

      const promptCard = promptTextarea.closest(".prompt-card");
      if (!String(promptTextarea.value || "").trim()) {
        promptTextarea.style.height = "";
        promptTextarea.style.overflowY = "hidden";
        promptCard?.classList.remove("is-scrollable");
        return;
      }

      const styles = getComputedStyle(promptTextarea);
      const lineHeight = Number.parseFloat(styles.lineHeight) || 24;
      const maxHeight = Math.max(lineHeight * 3, Math.min(window.innerHeight * 0.24, 168));

      promptTextarea.style.height = "auto";
      const nextHeight = Math.min(promptTextarea.scrollHeight, maxHeight);
      promptTextarea.style.height = `${Math.ceil(nextHeight)}px`;
      promptTextarea.style.overflowY = promptTextarea.scrollHeight > maxHeight ? "auto" : "hidden";
      promptCard?.classList.toggle("is-scrollable", promptTextarea.scrollHeight > maxHeight);
    }

    function fitHomeToViewport() {
      if (!stage || !fitTarget) return;

      // v72: do not scale the home canvas by feature-mode-specific content height.
      // Agent and Knowledge modes must keep the same physical title/input/card sizes
      // so the UI does not appear to jump when switching modes.
      fitTarget.style.setProperty("--home-scale", "1");
      stage.style.alignItems = "center";
    }

    const resizeObserver = new ResizeObserver(fitHomeToViewport);
    resizeObserver.observe(document.documentElement);
    resizeObserver.observe(stage);
    resizeObserver.observe(fitTarget);
    promptTextarea?.addEventListener("input", () => {
      resizePromptTextarea();
      fitHomeToViewport();
    });
    window.addEventListener("load", () => {
      resizePromptTextarea();
      fitHomeToViewport();
    });
    window.addEventListener("resize", () => {
      resizePromptTextarea();
      fitHomeToViewport();
    });
    bootstrapSsoProfile();
    resizePromptTextarea();
    fitHomeToViewport();
  </script>
