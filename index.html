<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DS ONE</title>
  <link rel="stylesheet" href="./style.css?v=20260601_greeting_text" />
</head>
<body>
  <div class="wrap">
    <header class="header" aria-label="DS ONE 인증 정보">
      <div>
        <div class="title">DS ONE</div>
        <div id="userInfo" class="user-info">인증 확인 중...</div>
      </div>
    </header>

    <!-- 기존 JS 호환용 버튼입니다. 화면에는 노출하지 않습니다. -->
    <nav class="mode-buttons" aria-label="업무 도우미 메뉴">
      <button id="aiBtn" class="mode-btn active" type="button">사내 AI</button>
      <button id="rpaBtn" class="mode-btn" type="button">RPA 실행</button>
    </nav>

    <main class="main">
      <section id="homePanel" class="panel home-panel active" aria-label="DS ONE 메뉴">
        <div class="home-shell">
          <div class="employee-badge" aria-label="DS단석 임직원 전용">
            <span>DS단석 전용 업무 AI</span>
          </div>

          <div class="hero-area">
            <div class="hero-copy">
              <h1>DS ONE</h1>
              <p class="hero-title">질문부터 실행까지 하나로</p>
              <!-- <p class="hero-desc">사내 업무를 더 빠르고 쉽게 도와드립니다</p> -->
            </div>

            <div class="hero-visual" aria-hidden="true">
              <span class="orbit orbit-a"></span>
              <span class="orbit orbit-b"></span>
              <span class="orbit-dot dot-a"></span>
              <span class="orbit-dot dot-b"></span>
              <span class="floating-tile tile-chat"><span></span><span></span><span></span></span>
              <span class="floating-tile tile-doc"></span>
              <span class="floating-tile tile-chart"><span></span><span></span><span></span></span>
              <div class="hero-robot">
                <img src="./robot.png" alt="" />
              </div>
            </div>
          </div>

          <div class="user-greeting" aria-live="polite">
            <span id="homeGreetingText">인증 확인 중입니다.</span>
          </div>

          <div class="menu-card-list" aria-label="DS ONE 기능 선택">
            <button id="directQuestionBtn" class="menu-card" type="button">
              <span class="menu-icon chat-icon" aria-hidden="true">
                <img src="./chat.png" alt="" />
              </span>
              <span class="menu-text">
                <strong>직접 질문하기</strong>
                <em>사내 규정, 시스템, 업무 문의</em>
              </span>
              <span class="menu-arrow" aria-hidden="true"></span>
            </button>

            <button id="docWriteBtn" class="menu-card" type="button">
              <span class="menu-icon doc-icon" aria-hidden="true">
                <img src="./ai.png" alt="" />
              </span>
              <span class="menu-text">
                <strong>AI 문서 작성</strong>
                <em>이메일, 결재문, 보고서 작성</em>
              </span>
              <span class="menu-arrow" aria-hidden="true"></span>
            </button>

            <button id="rpaEntryBtn" class="menu-card" type="button">
              <span class="menu-icon bot-icon" aria-hidden="true">
                <img src="./rpa.png" alt="" />
              </span>
              <span class="menu-text">
                <strong>RPA 실행</strong>
                <em>반복 업무 자동화 시작</em>
              </span>
              <span class="menu-arrow" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>

      <section id="aiPanel" class="panel" aria-label="직접 질문하기">
        <div class="sub-header">
          <button id="aiBackBtn" class="back-btn" type="button" aria-label="메뉴로 돌아가기">‹</button>
          <div>
            <strong>직접 질문하기</strong>
            <span>사내 규정, 시스템, 업무 문의</span>
          </div>
        </div>

        <div id="aiBody" class="body">
          <div class="msg bot">사내 AI 모드입니다. 질문을 입력하세요.</div>
        </div>

        <form id="chatForm" class="input-area">
          <textarea
            id="messageInput"
            placeholder="질문을 입력하세요"
            autocomplete="off"
            rows="1"
          ></textarea>
          <button id="sendBtn" class="send-btn" type="submit">전송</button>
        </form>
      </section>

      <section id="rpaPanel" class="panel" aria-label="RPA 실행">
        <div class="sub-header">
          <button id="rpaBackBtn" class="back-btn" type="button" aria-label="메뉴로 돌아가기">‹</button>
          <div>
            <strong>RPA 실행</strong>
            <span>반복 업무 자동화 시작</span>
          </div>
        </div>

        <div id="rpaBody" class="body">
          <div class="msg bot">RPA 실행 모드입니다. 실행 가능한 업무 목록을 불러오세요.</div>
        </div>

        <div class="input-area rpa-refresh-area">
          <button id="reloadRpaBtn" class="send-btn wide" type="button">RPA 목록 새로고침</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js?v=20260609_greeting_text"></script>
</body>
</html>
